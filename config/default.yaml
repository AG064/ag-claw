# ============================================
# AG-Claw Default Configuration
# ============================================

# Server settings
server:
  port: 18789
  host: "0.0.0.0"
  cors:
    enabled: true
    origins: ["*"]
  rateLimit:
    enabled: true
    windowMs: 60000
    maxRequests: 100

# Logging
logging:
  level: info
  format: pretty
  # file: ./data/ag-claw.log

# ============================================
# Model Configuration
# ============================================
model:
  provider: openrouter
  defaultModel: "anthropic/claude-sonnet-4-20250514"
  fallbackModel: "openai/gpt-4o"
  maxTokens: 8192
  temperature: 0.7
  retryAttempts: 3
  retryDelayMs: 1000

# ============================================
# Feature Toggles
# ============================================
features:
  # Communication
  webchat:
    enabled: true
    port: 3001
    maxConnections: 1000
    messageHistory: 100

  voice:
    enabled: false
    provider: elevenlabs
    voice: default
    model: eleven_multilingual_v2
    sttProvider: whisper

  # Knowledge & Memory
  knowledge-graph:
    enabled: true
    backend: sqlite
    path: ./data/knowledge.db

  multimodal-memory:
    enabled: true

  # Automation
  browser-automation:
    enabled: true

  webhooks:
    enabled: true

  mesh-workflows:
    enabled: true

  live-canvas:
    enabled: true

  container-sandbox:
    enabled: false

  air-gapped:
    enabled: false

  # Daily Intelligence
  morning-briefing:
    enabled: true

  evening-recap:
    enabled: true

  smart-recommendations:
    enabled: true

  # Collaboration
  group-management:
    enabled: true

# ============================================
# Memory Settings
# ============================================
memory:
  primary: sqlite
  path: ./data/memory.db
  selfEvolving: true
  compressionThreshold: 10000
  # Supabase (optional)
  # supabaseUrl: ""
  # supabaseKey: ""

# ============================================
# Security Settings
# ============================================
security:
  policy: config/security-policy.yaml
  secrets: encrypted
  auditLog: true
  allowlistMode: permissive

# ============================================
# Channel Configuration
# ============================================
channels:
  telegram:
    enabled: true
    # token: set via AGCLAW_TELEGRAM_TOKEN env var

  webchat:
    enabled: true

  mobile:
    enabled: false
    # fcmKey: set via AGCLAW_FCM_KEY env var
