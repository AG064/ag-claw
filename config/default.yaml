# ============================================
# AG-Claw Default Configuration
# ============================================

# Server settings - the gateway HTTP server
server:
  port: 18789
  host: "127.0.0.1"
  cors:
    enabled: true
    origins: ["http://localhost:18789", "http://127.0.0.1:18789"]
  rateLimit:
    enabled: true
    windowMs: 60000
    maxRequests: 100

# Logging - pretty for dev, json for production
logging:
  level: info
  format: pretty
  # file: ./data/ag-claw.log

# ============================================
# Model Configuration
# ============================================
# Which LLM to use. OpenRouter gives access to many models.
model:
  provider: openrouter
  defaultModel: "anthropic/claude-sonnet-4-20250514"
  fallbackModel: "openai/gpt-4o"
  maxTokens: 8192
  temperature: 0.7
  retryAttempts: 3
  retryDelayMs: 1000

# ============================================
# Feature Toggles
# ============================================
# Enable or disable features here. Everything is opt-in.
features:
  # Communication
  webchat:
    enabled: false
    port: 3001
    host: "127.0.0.1"
    requireAuth: true
    # authToken: set via AGCLAW_WEBCHAT_AUTH_TOKEN; minimum 16 characters
    maxConnections: 1000
    messageHistory: 100
    maxMessageLength: 10000
    maxPayloadBytes: 1048576

  voice:
    enabled: false
    provider: elevenlabs
    voice: default
    model: eleven_multilingual_v2
    sttProvider: whisper

  # Knowledge & Memory
  knowledge-graph:
    enabled: true
    backend: sqlite
    path: ./data/knowledge.db

  multimodal-memory:
    enabled: true

  # Automation
  browser-automation:
    enabled: false

  computer-control:
    enabled: false          # Vision-based desktop automation (disabled by default)
    screenshot_interval_ms: 1000
    platform: auto          # auto, linux, macos, windows
    display_number: 0

  webhooks:
    enabled: false

  mesh-workflows:
    enabled: false

  live-canvas:
    enabled: false

  container-sandbox:
    enabled: false

  air-gapped:
    enabled: false

  # Daily Intelligence
  morning-briefing:
    enabled: false

  evening-recap:
    enabled: false

  smart-recommendations:
    enabled: false

  # Collaboration
  group-management:
    enabled: false

# ============================================
# Memory Settings
# ============================================
# Where and how to store agent memories.
memory:
  primary: sqlite
  path: ./data/memory.db
  selfEvolving: true
  compressionThreshold: 10000
  # Supabase (optional, for cloud-backed memory)
  # supabaseUrl: ""
  # supabaseKey: ""

# ============================================
# Security Settings
# ============================================
security:
  policy: config/security-policy.yaml
  secrets: encrypted
  auditLog: true
  allowlistMode: strict

# ============================================
# Channel Configuration
# ============================================
# Which communication channels are active.
channels:
  telegram:
    enabled: false
    # token: set via AGCLAW_TELEGRAM_TOKEN env var
    # Set allowAll: true only for trusted private bots; otherwise set allowedUsers/allowedChats.

  webchat:
    enabled: false
    # authToken: set via AGCLAW_WEBCHAT_AUTH_TOKEN; minimum 16 characters

  mobile:
    enabled: false
    # fcmKey: set via AGCLAW_FCM_KEY env var
