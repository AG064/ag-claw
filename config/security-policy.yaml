# ============================================
# AG-Claw Security Policy
# ============================================
# Inspired by NemoClaw's security layer.
# Defines allowed actions per role, command restrictions,
# and sandbox parameters.
# ============================================

# Policy version
version: 1

# ============================================
# Command Allowlist
# ============================================
# Commands the agent is allowed to execute.
# Use "*" to allow all (not recommended for production).
allowedCommands:
  # File system
  - ls
  - cat
  - head
  - tail
  - grep
  - find
  - wc
  - tree
  - du
  - df
  - file
  - stat

  # Text processing
  - sed
  - awk
  - sort
  - uniq
  - cut
  - tr
  - jq

  # Git
  - git

  # Package managers
  - npm
  - npx
  - node
  - python3
  - pip3

  # Docker (if container-sandbox is enabled)
  # - docker
  # - docker-compose

  # Network tools
  - curl
  - wget

  # System info
  - uname
  - whoami
  - date
  - uptime
  - hostname
  - ps
  - free

  # Build tools
  - make
  - tsc

# ============================================
# Blocked Commands
# ============================================
# Commands explicitly forbidden regardless of allowlist.
blockedCommands:
  - rm
  - rmdir
  - dd
  - mkfs
  - fdisk
  - chmod
  - chown
  - sudo
  - su
  - kill
  - killall
  - reboot
  - shutdown
  - passwd
  - useradd
  - userdel
  - usermod
  - crontab
  - iptables
  - systemctl

# ============================================
# Path Restrictions
# ============================================
allowedPaths:
  - /app/
  - /home/
  - /tmp/
  - ./data/
  - ./memory/
  - ./config/

blockedPaths:
  - /etc/shadow
  - /etc/passwd
  - /root/.ssh/
  - ~/.ssh/
  - /var/log/auth.log

# ============================================
# Network Hosts
# ============================================
allowedHosts:
  - api.openai.com
  - api.anthropic.com
  - openrouter.ai
  - api.elevenlabs.io
  - github.com
  - api.github.com
  - "*.supabase.co"
  - registry.npmjs.org

blockedHosts:
  - localhost
  - 127.0.0.1
  - 169.254.169.254  # AWS metadata
  - metadata.google.internal

# ============================================
# Policy Rules
# ============================================
# Evaluated by PolicyEngine. Higher priority = checked first.
rules:
  - id: rule_admin_full_access
    name: "Admin Full Access"
    description: "Administrators have unrestricted access"
    action: allow
    priority: 100
    enabled: true
    auditLevel: info
    conditions:
      - field: user
        operator: equals
        value: admin

  - id: rule_block_sensitive_commands
    name: "Block Sensitive Commands"
    description: "Deny access to potentially dangerous commands"
    action: deny
    priority: 90
    enabled: true
    auditLevel: error
    conditions:
      - field: action
        operator: in
        value: ["shell_exec", "file_delete", "system_modify"]

  - id: rule_audit_external_api
    name: "Audit External API Calls"
    description: "Log all external API calls for review"
    action: audit
    priority: 50
    enabled: true
    auditLevel: info
    conditions:
      - field: resource
        operator: matches
        value: "^https?://.*"

  - id: rule_default_allow
    name: "Default Allow"
    description: "Allow all non-explicitly-denied actions"
    action: allow
    priority: 1
    enabled: true
    auditLevel: none
    conditions: []

# ============================================
# Rate Limits
# ============================================
rateLimits:
  api_calls:
    windowMs: 60000
    maxRequests: 60
    keyField: user

  shell_commands:
    windowMs: 60000
    maxRequests: 30
    keyField: user

  file_operations:
    windowMs: 60000
    maxRequests: 100
    keyField: user

# ============================================
# Sandbox Settings
# ============================================
sandbox:
  enabled: false
  image: node:20-alpine
  memoryLimit: 512m
  cpuLimit: "1.0"
  timeoutMs: 30000
  networkAccess: false
  readOnlyRoot: true
  tmpfs:
    size: 64m
