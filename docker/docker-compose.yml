version: '3.8'

services:
  ag-claw:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ag-claw
    ports:
      - "18789:18789"
      - "3001:3001"
    volumes:
      - ag-claw-data:/app/data
      - ag-claw-memory:/app/memory
      - ../config:/app/config:ro
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - AGCLAW_PORT=18789
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ag-claw-net

  # Optional: Redis for rate limiting and caching
  redis:
    image: redis:7-alpine
    container_name: ag-claw-redis
    ports:
      - "6379:6379"
    volumes:
      - ag-claw-redis:/data
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - ag-claw-net
    profiles:
      - with-redis

networks:
  ag-claw-net:
    driver: bridge

volumes:
  ag-claw-data:
    driver: local
  ag-claw-memory:
    driver: local
  ag-claw-redis:
    driver: local
