services:
  ag-claw:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ag-claw
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ag-claw-data:/app/data
      - ag-claw-memory:/app/memory
      - ../config:/app/config:ro
    environment:
      - NODE_ENV=production
      - AGCLAW_WORKDIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ag-claw-data:
  ag-claw-memory:
