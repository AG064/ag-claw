version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "development"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "fix"
      include: "scope"
    reviewers:
      - "AG064"

  # Root Dockerfile used by release/publish workflows
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "development"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Runtime image under /docker used by local and CI container builds
  - package-ecosystem: "docker"
    directory: "/docker"
    target-branch: "development"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "development"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
