version: 2
updates:
  # Security updates - auto-merge enabled
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "security"
      - "automated"
    commit-message:
      prefix: "fix"
      include: "scope"
    # Auto-approve and auto-merge security updates
    reviewers:
      - "AG064"

  # Docker base image updates
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    labels:
      - "docker"
      - "automated"
    commit-message:
      prefix: "chore"
      include: "scope"
