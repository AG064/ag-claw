name: Weekly Security Audit

on:
  schedule:
    # Every Monday at 10:00 UTC
    - cron: '0 10 * * 1'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '**.ts'
      - '**.js'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          comment-summary-in-pr: on-failure
          fail-on-severity: high

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: npm audit --audit-level=high --json > npm-audit-high.json || true

      - name: Check for dangerous patterns
        run: |
          echo "Scanning for dangerous patterns..."
          DANGEROUS=$(grep -r -l -E "(eval\s*\(|new\s+Function\s*\(|child_process|exec\(|spawn\(|fork\()" --include="*.ts" --include="*.js" src/ 2>/dev/null | wc -l || echo "0")
          echo "Found $DANGEROUS file(s) with potentially dangerous code"
          echo "dangerous_files=$DANGEROUS" >> $GITHUB_OUTPUT

      - name: Create issue on vulnerabilities
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔒 Weekly Security Audit\n\n';
            body += '**Date:** ' + new Date().toISOString().split('T')[0] + '\n\n';

            try {
              const audit = JSON.parse(fs.readFileSync('npm-audit-high.json', 'utf8'));
              const vulns = Object.values(audit.vulnerabilities || {});
              if (vulns.length > 0) {
                body += `⚠️ Found **${vulns.length}** vulnerable package(s)\n\n`;
                for (const [name, info] of Object.entries(audit.vulnerabilities || {})) {
                  body += `- \`${name}\`: ${info.title || 'vulnerability'}\n`;
                }
              } else {
                body += '✅ No high/critical vulnerabilities found.\n';
              }
            } catch (e) {
              body += '✅ No audit issues.\n';
            }

            const dangerous = parseInt(process.env.dangerous_files || '0');
            if (dangerous > 0) {
              body += `\n⚠️ Found **${dangerous}** file(s) with potentially dangerous code patterns.\n`;
            }

            body += '\n---\n_Auto-generated by Argentum weekly audit_';

            // Check for recent issues (don't spam)
            const recent = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['security', 'automated'],
              per_page: 5
            });

            const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
            const hasRecent = recent.data.some(issue =>
              new Date(issue.created_at) > weekAgo
            );

            if (!hasRecent) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔒 Weekly Security Audit - ${new Date().toISOString().split('T')[0]}`,
                body: body,
                labels: ['security', 'automated']
              });
              console.log('Created security issue');
            } else {
              console.log('Recent security issue exists, skipping');
            }