name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: TypeScript check
        run: npm run typecheck
      
      - name: ESLint
        run: npm run lint
      
      - name: Prettier check
        run: npm run format:check || true

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install
        run: npm ci --legacy-peer-deps
      
      - name: Run tests
        run: npm test
        env:
          CI: true

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install
        run: npm ci --legacy-peer-deps
      
      - name: Build
        run: npm run build
      
      - name: Verify build output
        run: |
          ls -la dist/
          test -f dist/index.js || exit 1

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install
        run: npm ci --legacy-peer-deps
      
      - name: Build
        run: npm run build
      
      - name: Integration tests
        run: npm run test:integration
        env:
          CI: true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install
        run: npm ci --legacy-peer-deps
      
      - name: Security audit
        run: npm audit --audit-level=high || true
      
      - name: Snyk (if available)
        run: npx snyk test || true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t ag-claw:test -f docker/Dockerfile .
          docker run ag-claw:test --version || true
      
      - name: Verify Docker
        run: |
          docker images ag-claw:test
          test "$(docker images ag-claw:test -q | wc -l)" -gt 0

  installation-test:
    name: Installation Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        install_method: [npm, docker, binary]
    steps:
      - uses: actions/checkout@v4
      
      - name: NPM install
        if: matrix.install_method == 'npm'
        run: |
          npm ci --legacy-peer-deps
          npm run build
          ./dist/index.js --version || true
      
      - name: Docker install
        if: matrix.install_method == 'docker'
        run: |
          docker build -t ag-claw:test -f docker/Dockerfile .
          docker run ag-claw:test --version || true
      
      - name: Binary install
        if: matrix.install_method == 'binary'
        run: |
          # Simulate binary download and test
          echo "Binary installation test"
          echo "Binary simulation complete"

  lint-all-branches:
    name: Lint All Branches
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install
        run: npm ci --legacy-peer-deps
      
      - name: Full lint check
        run: |
          npm run lint
          npm run typecheck
          npm run format:check || true
