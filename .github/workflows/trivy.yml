name: Trivy Security Scan

on:
  push:
    branches: [main, master, development]
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - '.github/workflows/trivy.yml'
  pull_request:
    branches: [main, master, development]
    paths:
      - 'Dockerfile'
      - 'docker/**'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ag-claw:${{ github.sha }} -f docker/Dockerfile .

      - name: Run Trivy (CRITICAL only)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ag-claw:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL

      - name: Run Trivy (full report)
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          image-ref: ag-claw:${{ github.sha }}
          format: table
          output: trivy-full.txt
          severity: HIGH,CRITICAL

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Fail on CRITICAL vulnerabilities
        run: |
          CRITICAL="$(grep -c '"severity": "CRITICAL"' trivy-results.sarif || echo "0")"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "Found $CRITICAL CRITICAL vulnerabilities - failing build"
            grep '"severity": "CRITICAL"' trivy-results.sarif | head -5
            exit 1
          fi
          echo "No critical vulnerabilities found"

      - name: Create issue for HIGH vulnerabilities
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HIGH="$(grep -c '"severity": "HIGH"' trivy-results.sarif || echo "0")"
          if [ "$HIGH" -gt 0 ] && [ "$HIGH" -lt 20 ]; then
            cat > /tmp/trivy-issue.md <<EOF
          Trivy found **$HIGH HIGH** vulnerabilities in the Docker image.

          These are non-blocking and should be addressed with an updated base image or dependency refresh.

          \`\`\`
          $(head -50 trivy-full.txt 2>/dev/null)
          \`\`\`

          _Generated by AGX Security Bot_
          EOF

            gh issue create \
              --title "🚨 Trivy: $HIGH HIGH vulnerabilities in Docker image" \
              --body-file /tmp/trivy-issue.md \
              --label security \
              --label automated || true
          fi
