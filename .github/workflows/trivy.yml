name: Trivy Security Scan

on:
  push:
    branches: [main, master, development]
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - '.github/workflows/trivy.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'docker/**'
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC

jobs:
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ag-claw:${{ github.sha }} -f docker/Dockerfile .

      - name: Run Trivy (CRITICAL only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ag-claw:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'

      - name: Run Trivy (full report)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ag-claw:${{ github.sha }}'
          format: 'table'
          output: 'trivy-full.txt'
          severity: 'HIGH,CRITICAL'
        continue-on-error: true

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Fail on CRITICAL vulnerabilities
        run: |
          CRITICAL=$(grep -c '"severity": "CRITICAL"' trivy-results.sarif || echo "0")
          if [ "$CRITICAL" -gt "0" ]; then
            echo "Found $CRITICAL CRITICAL vulnerabilities - failing build"
            grep '"severity": "CRITICAL"' trivy-results.sarif | head -5
            exit 1
          fi
          echo "No critical vulnerabilities found"

      - name: Create issue for HIGH vulnerabilities
        if: always()
        run: |
          HIGH=$(grep -c '"severity": "HIGH"' trivy-results.sarif || echo "0")
          if [ "$HIGH" -gt "0" ] && [ "$HIGH" -lt "20" ]; then
            echo "Found $HIGH HIGH vulnerabilities - creating issue"
            gh issue create \
              --title "🚨 Trivy: $HIGH HIGH vulnerabilities in Docker image" \
              --body "Trivy found **$HIGH HIGH** vulnerabilities in the Docker image.

These are non-blocking (inherited from base image) but should be addressed.

\`\`\`
$(cat trivy-full.txt 2>/dev/null | head -50)
\`\`\`

**Note:** Consider upgrading to a newer Alpine base image or waiting for upstream fixes.

_Generated by AGX Security Bot_" \
              --label "security" --label "automated" 2>/dev/null || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
