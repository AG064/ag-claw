name: Build Binary

on:
  workflow_dispatch:

jobs:
  portable-binaries:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install executable packager
        run: npm install -g @yao-pkg/pkg@6.6.0

      - name: Build portable binaries
        shell: bash
        run: |
          mkdir -p artifacts/release
          pkg --config package.json dist/cli.js --targets node18-linux-x64 --output "artifacts/release/argentum-v${{ steps.package.outputs.version }}-linux-x64" --compress GZip --no-bytecode --public-packages "*" --public
          pkg --config package.json dist/cli.js --targets node18-win-x64 --output "artifacts/release/argentum-v${{ steps.package.outputs.version }}-win-x64-portable.exe" --compress GZip --no-bytecode --public-packages "*" --public
          pkg --config package.json dist/cli.js --targets node18-macos-x64 --output "artifacts/release/argentum-v${{ steps.package.outputs.version }}-macos-x64" --compress GZip --no-bytecode --public-packages "*" --public

      - name: Smoke test Linux binary
        run: ./artifacts/release/argentum-v${{ steps.package.outputs.version }}-linux-x64 --version

      - name: Write checksums
        shell: bash
        run: |
          cd artifacts/release
          sha256sum argentum-v${{ steps.package.outputs.version }}-linux-x64 argentum-v${{ steps.package.outputs.version }}-win-x64-portable.exe argentum-v${{ steps.package.outputs.version }}-macos-x64 > SHA256SUMS-portable.txt

      - name: Upload portable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: argentum-portable-binaries
          path: |
            artifacts/release/argentum-v*-linux-x64
            artifacts/release/argentum-v*-win-x64*.exe
            artifacts/release/argentum-v*-macos-x64
            artifacts/release/SHA256SUMS-portable.txt

  windows-installer:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - run: npm ci

      - name: Build Windows EXE and MSI
        shell: pwsh
        run: .\scripts\build-windows-release.ps1 -OutDir artifacts\release

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: argentum-windows-installer
          path: |
            artifacts/release/argentum-v*-win-x64-portable.exe
            artifacts/release/argentum-v*-win-x64.msi
            artifacts/release/SHA256SUMS.txt
