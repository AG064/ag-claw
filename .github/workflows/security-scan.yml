name: Security Scan

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          npm audit --json > npm-audit.json || true
          npm audit --audit-level=high > audit-report.txt || true

      - name: Check for dangerous patterns
        id: patterns
        run: |
          echo "Scanning for dangerous patterns (eval, new Function, child_process, sh -c)..."
          grep -r -n -E "(eval|new Function|require\(['\"](child_process|util)['\"]\)|exec\(|spawn\(|fork\(|sh -c)" --include="*.ts" --include="*.js" src/ || echo "No dangerous patterns found"
          echo "pattern_found=$(grep -r -l -E "(eval|new Function|require\(['\"](child_process|util)['\"]\)|exec\(|spawn\(|fork\(|sh -c)" --include='*.ts' --include='*.js' src/ | wc -l)" >> $GITHUB_OUTPUT

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            npm-audit.json
            audit-report.txt
            security-patterns.txt

      - name: Create GitHub Issue if vulnerabilities found
        if: |
          steps.audit.outputs.vulnerabilities > 0 ||
          steps.patterns.outputs.pattern_found > 0 ||
          contains(steps.audit.outputs.audit-level, 'high') ||
          contains(steps.audit.outputs.audit-level, 'critical')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let issueBody = '## Security Scan Report\n\n';
            issueBody += '**Repository:** ' + context.repo.repo + '\n\n';
            issueBody += '**Date:** ' + new Date().toISOString() + '\n\n';

            // Check npm audit results
            try {
              const audit = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
              if (audit.vulnerabilities) {
                issueBody += '### npm audit findings:\n';
                const vulnerableCount = Object.keys(audit.vulnerabilities).length;
                issueBody += `Found ${vulnerableCount} vulnerable package(s):\n\n`;
                for (const [pkg, vuln] of Object.entries(audit.vulnerabilities)) {
                  issueBody += `- **${pkg}**\n`;
                  issueBody += `  - Severity: ${vuln.severity}\n`;
                  if (vuln.via && vuln.via.length > 0) {
                    issueBody += `  - Vulnerabilities: ${vuln.via.map(v => v.id).join(', ')}\n`;
                  }
                }
              }
            } catch (e) {
              issueBody += 'No npm audit vulnerabilities found.\n';
            }

            // Check dangerous patterns
            try {
              const patternCount = parseInt(process.env.pattern_found || '0');
              if (patternCount > 0) {
                issueBody += '\n### Dangerous code patterns detected:\n';
                issueBody += `Found ${patternCount} file(s) containing potentially dangerous patterns.\n`;
                issueBody += 'Please review the security-reports artifact for details.\n';
              }
            } catch (e) {
              // ignore
            }

            issueBody += '\n---\n';
            issueBody += '**Generated by GitHub Actions Security Scan workflow**';

            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['security', 'automated'],
              per_page: 10
            });

            const similarIssue = existingIssues.data.find(issue =>
              issue.title.includes('Security Scan Report') &&
              issue.created_at > new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString()
            );

            if (similarIssue) {
              console.log(`Similar issue already exists: #${similarIssue.number}`);
              process.exit(0);
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Security Scan Report - ${new Date().toISOString().split('T')[0]}`,
              body: issueBody,
              labels: ['security', 'automated']
            });