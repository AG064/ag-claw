name: Security Scan

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          npm audit --json > npm-audit.json 2>&1 || true
          npm audit --audit-level=high > audit-report.txt 2>&1 || true

      - name: Check for dangerous patterns
        id: patterns
        run: |
          echo "Scanning for dangerous patterns..."
          DANGEROUS=$(grep -r -l -E "(eval\s*\(|new\s+Function\s*\(|child_process|exec\(|spawn\(|fork\()" --include="*.ts" --include="*.js" src/ 2>/dev/null | wc -l || echo "0")
          echo "pattern_found=$DANGEROUS"
          if [ "$DANGEROUS" -gt "0" ]; then
            echo "Found potentially dangerous patterns in $DANGEROUS file(s)"
          fi

      - name: Count vulnerabilities
        id: vuln_count
        run: |
          VULNS=$(node -e "try{const a=require('./npm-audit.json');const v=Object.values(a.vulnerabilities||{});console.log(v.length)}catch(e){console.log(0)}" 2>/dev/null || echo "0")
          echo "vulnerabilities=$VULNS"
          echo "vulnerabilities=$VULNS" >> $GITHUB_OUTPUT

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            npm-audit.json
            audit-report.txt
          retention-days: 7

      - name: Create GitHub Issue if vulnerabilities found
        if: |
          vars.SHOULD_CREATE_ISSUE == 'true' &&
          (steps.audit.outputs.vulnerabilities != '0' || steps.patterns.outputs.pattern_found != '0')
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            let issueBody = '## 🔒 Security Scan Report\n\n';
            issueBody += '**Date:** ' + new Date().toISOString() + '\n\n';

            // Count vulnerabilities
            const vulnCount = parseInt(process.env.VULNERABILITIES || '0');
            if (vulnCount > 0) {
              issueBody += `⚠️ Found **${vulnCount}** vulnerable package(s)\n\n`;
              issueBody += 'See `npm-audit.json` artifact for details.\n\n';
            }

            const patternCount = parseInt(process.env.PATTERN_FOUND || '0');
            if (patternCount > 0) {
              issueBody += `⚠️ Found **${patternCount}** file(s) with potentially dangerous code patterns\n\n`;
            }

            issueBody += '---\n';
            issueBody += '_Generated by AG-Claw Security Scan workflow_';

            // Check for existing issues
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['security'],
              per_page: 5
            });

            const recent = existingIssues.data.find(issue => 
              issue.created_at > new Date(Date.now() - 48 * 60 * 60 * 1000).toISOString()
            );

            if (recent) {
              console.log('Recent security issue exists, skipping');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 Security Scan - ${new Date().toISOString().split('T')[0]}`,
              body: issueBody,
              labels: ['security', 'automated']
            });
        env:
          VULNERABILITIES: ${{ steps.audit.outputs.vulnerabilities }}
          PATTERN_FOUND: ${{ steps.patterns.outputs.pattern_found }}
          SHOULD_CREATE_ISSUE: ${{ vars.CREATE_SECURITY_ISSUES }}
