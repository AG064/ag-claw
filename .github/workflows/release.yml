name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. v1.2.3)'
        required: false
      release_type:
        description: 'Release type'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write
  security-events: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Determine Release Version ───────────────────────────────────────────────

  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      version_major: ${{ steps.version.outputs.major }}
      version_minor: ${{ steps.version.outputs.minor }}
      version_patch: ${{ steps.version.outputs.patch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          if [ "$TAG" != "${TAG#v}" ]; then
            VERSION="${TAG#v}"
          else
            VERSION="$TAG"
          fi

          # Parse semver
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3 | cut -d- -f1)
          PRERELEASE=$(echo "$VERSION" | grep -oE -- '-[a-zA-Z0-9.]+' || echo "")

          IS_PRERELEASE="false"
          if [ -n "$PRERELEASE" ]; then
            IS_PRERELEASE="true"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "::notice title=Release Version::$VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "Previous tag: $PREV_TAG"

          if [ -z "$PREV_TAG" ]; then
            echo "First release. Full changelog from beginning:"
            LOG=$(git log --oneline --all | head -100)
          else
            echo "Changelog from $PREV_TAG to ${{ github.ref_name }}:"
            LOG=$(git log --oneline "$PREV_TAG"..HEAD)
          fi

          # Format as markdown changelog
          CHANGELOG=""
          while IFS= read -r line; do
            # Parse conventional commits
            COMMIT_MSG="$line"
            TYPE=$(echo "$line" | sed -n 's/.*feat\(.*\)/feat/p;s/.*fix\(.*\)/fix/p;s/.*docs\(.*\)/docs/p;s/.*chore\(.*\)/chore/p;s/.*test\(.*\)/test/p;s/.*refactor\(.*\)/refactor/p;s/.*perf\(.*\)/perf/p;s/.*ci\(.*\)/ci/p;s/.*build\(.*\)/build/p;s/.*BREAKING CHANGE.*/breaking/p')
            SCOPE=$(echo "$line" | grep -oE '\([^)]+\)' | head -1 | tr -d '()' || echo "")
            DESC=$(echo "$line" | sed 's/^[^:]*: //' | sed 's/^[a-zA-Z0-9_-]*([a-zA-Z0-9_,-]*): //')

            if [ -z "$DESC" ]; then DESC="$line"; fi
            if [ -n "$SCOPE" ]; then
              CHANGELOG="${CHANGELOG}- **${TYPE}(${SCOPE}):** ${DESC}\n"
            else
              CHANGELOG="${CHANGELOG}- **${TYPE}:** ${DESC}\n"
            fi
          done <<< "$LOG"

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ─── Validate & Test ────────────────────────────────────────────────────────

  validate:
    name: Pre-release Validation
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci
        env:
          CI: true
          NODE_OPTIONS: '--experimental-vm-modules'

      - name: Build
        run: npm run build:prod

  # ─── Build Docker Image ──────────────────────────────────────────────────────

  docker:
    name: Build Docker Image
    needs: [validate, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ !needs.version.outputs.is_prerelease }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ matrix.platform }}
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            VERSION=${{ needs.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        if: matrix.platform == 'linux/amd64'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        if: matrix.platform == 'linux/amd64'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

  # ─── Publish to npm ─────────────────────────────────────────────────────────

  npm:
    name: Publish to npm
    needs: [validate, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@ag064'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:prod

      - name: Publish to npm
        if: ${{ !needs.version.outputs.is_prerelease }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (prerelease)
        if: ${{ needs.version.outputs.is_prerelease }}
        run: npm publish --access public --tag beta --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Create GitHub Release ────────────────────────────────────────────────────

  github-release:
    name: Create GitHub Release
    needs: [version, docker, npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: ./

      - name: Generate Release Notes
        id: release_notes
        run: |
          cat > release-notes.md << 'NOTES'
          ## 🚀 What's New

          ${{ needs.version.outputs.changelog }}

          ## 📦 Assets

          **Docker images:**
          - \`ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}\`
          - \`ghcr.io/${{ env.IMAGE_NAME }}:latest\` (stable only)

          **SBOM:** Software Bill of Materials is attached.

          ## 🔧 Build Info

          - **Version:** ${{ needs.version.outputs.version }}
          - **Node.js:** ${{ env.NODE_VERSION }}
          - **Released:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          NOTES
          echo "release_notes_file=release-notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Release ${{ needs.version.outputs.version }}
          body_path: ${{ steps.release_notes.outputs.release_notes_file }}
          draft: false
          prerelease: ${{ needs.version.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            sbom.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist tarball
        run: |
          tar -czf ag-claw-${{ needs.version.outputs.version }}-dist.tar.gz dist/
          gh release upload ${{ needs.version.outputs.tag }} ag-claw-${{ needs.version.outputs.version }}-dist.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Announcement ────────────────────────────────────────────────────────────

  announcement:
    name: Generate Announcement
    needs: [github-release, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate announcement
        run: |
          VERSION=${{ needs.version.outputs.version }}
          IS_PRERELEASE=${{ needs.version.outputs.is_prerelease }}

          ANNOUNCEMENT=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            ANNOUNCEMENT="## 🎉 Pre-release $VERSION is now available!"
          else
            ANNOUNCEMENT="## 🎉 AG-Claw $VERSION is now available!"
          fi

          ANNOUNCEMENT="$ANNOUNCEMENT

          ### Install

          \`\`\`bash
          npm install -g ag-claw
          \`\`\`

          ### Docker

          \`\`\`bash
          docker pull ghcr.io/${{ env.IMAGE_NAME }}:$VERSION
          \`\`\"

          # Save for use in other steps
          echo "$ANNOUNCEMENT" > announcement.md
          echo "announcement_file=announcement.md" >> $GITHUB_OUTPUT

      - name: Post to GitHub Discussion
        if: ${{ !needs.version.outputs.is_prerelease }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const announcement = fs.readFileSync('announcement.md', 'utf8');
            const [owner, repo] = context.repo.owner.split('/');
            // Try to find or create a release discussion
            try {
              const discussions = await github.rest.discussions.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                category: 'announcements',
                per_page: 5
              });
              console.log('Found', discussions.data.length, 'existing announcements');
            } catch (e) {
              console.log('Discussions not available or not enabled');
            }

      - name: Create社交媒体 announcement file
        run: |
          # Save announcement as an artifact for manual posting
          mkdir -p release-artifacts
          cp announcement.md release-artifacts/
          echo "## Social" > release-artifacts/social.md
          echo "\`ag-claw ${{ needs.version.outputs.version }}\` is out! 🚀" >> release-artifacts/social.md
          echo "Modular AI agent framework with Agentic Tool Loop" >> release-artifacts/social.md
          echo "#AGClaw #AI #OpenSource" >> release-artifacts/social.md

      - name: Upload announcement artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-announcements
          path: release-artifacts/
          retention-days: 30

  # ─── Sync to Community ───────────────────────────────────────────────────────

  sync:
    name: Post-Release Sync
    needs: [github-release, version]
    runs-on: ubuntu-latest
    if: ${{ !needs.version.outputs.is_prerelease }}
    steps:
      - name: Checkout community repo (if configured)
        uses: actions/checkout@v4
        if: vars.COMMUNITY_REPO != ''
        with:
          repository: ${{ vars.COMMUNITY_REPO }}
          path: community
          token: ${{ secrets.COMMUNITY_REPO_TOKEN }}
          sparse-checkout: |
            README.md
            versions.json
          sparse-checkout-cone-mode: false

      - name: Update community README version
        if: vars.COMMUNITY_REPO != ''
        run: |
          if [ -f community/README.md ]; then
            sed -i 's/ag-claw@[0-9]*\.[0-9]*\.[0-9]*/ag-claw@${{ needs.version.outputs.version }}/g' community/README.md
            echo "Updated community README"
          fi
