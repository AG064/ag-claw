name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npm install -g pkg

      - name: Build Linux binary
        run: pkg dist/cli.js --targets node18-linux-x64 --output agclaw-linux-x64

      - name: Build Windows binary
        run: pkg dist/cli.js --targets node18-win-x64 --output agclaw-win.exe

      - name: Build macOS binary
        run: pkg dist/cli.js --targets node18-macos-x64 --output agclaw-macos

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            agclaw-linux-x64
            agclaw-win.exe
            agclaw-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Notify success
        run: |
          echo "Release ${{ github.ref_name }} built successfully!"
