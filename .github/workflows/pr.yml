name: PR Auto-Labeling & Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, draft]
    branches: [main, master, develop]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: read
  repository-projects: write

jobs:
  pr-metadata:
    name: PR Metadata
    runs-on: ubuntu-latest
    outputs:
      pr_type: ${{ steps.labels.outputs.pr_type }}
      pr_scope: ${{ steps.labels.outputs.pr_scope }}
      is_breaking: ${{ steps.labels.outputs.is_breaking }}
    steps:
      - name: Analyze PR title
        id: labels
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "Analyzing: $TITLE"

          TYPE="unknown"
          if echo "$TITLE" | grep -qi "^feat|^\+"; then TYPE="feature";
          elif echo "$TITLE" | grep -qi "^fix|^\-"; then TYPE="bugfix";
          elif echo "$TITLE" | grep -qi "^docs"; then TYPE="docs";
          elif echo "$TITLE" | grep -qi "^test"; then TYPE="test";
          elif echo "$TITLE" | grep -qi "^refactor"; then TYPE="refactor";
          elif echo "$TITLE" | grep -qi "^perf"; then TYPE="performance";
          elif echo "$TITLE" | grep -qi "^ci|build"; then TYPE="ci";
          elif echo "$TITLE" | grep -qi "^chore"; then TYPE="chore";
          elif echo "$TITLE" | grep -qi "^security"; then TYPE="security";
          elif echo "$TITLE" | grep -qi "^revert"; then TYPE="revert";
          fi

          SCOPE=$(echo "$TITLE" | grep -oE '\([^)]+\)' | head -1 | tr -d '()' || echo "")
          BREAKING="false"
          if echo "$TITLE" | grep -qi "BREAKING"; then BREAKING="true"; fi

          echo "pr_type=$TYPE" >> $GITHUB_OUTPUT
          echo "pr_scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "is_breaking=$BREAKING" >> $GITHUB_OUTPUT

  label-pr:
    name: Label PR
    runs-on: ubuntu-latest
    needs: [pr-metadata]
    steps:
      - name: Apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const labels = [];

            const typeMap = {
              'feature': 'type: feature',
              'bugfix': 'type: bugfix',
              'docs': 'type: docs',
              'test': 'type: test',
              'refactor': 'type: refactor',
              'performance': 'type: performance',
              'ci': 'type: ci',
              'chore': 'type: chore',
              'security': 'type: security',
              'revert': 'type: revert',
              'unknown': 'type: other'
            };

            const prType = '${{ needs.pr-metadata.outputs.pr_type }}';
            const typeLabel = typeMap[prType] || 'type: other';
            labels.push(typeLabel);

            const additions = context.payload.pull_request.additions || 0;
            const deletions = context.payload.pull_request.deletions || 0;
            const changes = additions + deletions;
            let sizeLabel = 'size: small';
            if (changes > 1000) sizeLabel = 'size: xlarge';
            else if (changes > 500) sizeLabel = 'size: large';
            else if (changes > 200) sizeLabel = 'size: medium';
            labels.push(sizeLabel);

            if ('${{ needs.pr-metadata.outputs.is_breaking }}' === 'true') {
              labels.push('breaking change');
            }

            if (context.payload.pull_request.draft) {
              labels.push('status: draft');
            }

            for (const label of labels) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: prNumber,
                  labels: [label]
                });
                console.log('Applied label:', label);
              } catch (e) {
                console.log('Label already exists or failed:', label);
              }
            }

  assign-reviewers:
    name: Assign Reviewers
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Assign code owner as reviewer
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;
            const files = context.payload.pull_request.changed_files || 0;
            const owner_name = context.repo.owner;
            if (owner_name !== author) {
              await github.rest.pulls.requestReviewers({
                owner, repo,
                pull_number: prNumber,
                reviewers: [owner_name]
              });
              console.log('Assigned reviewer:', owner_name);
            }

      - name: Comment on PR with checklist
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const isDraft = context.payload.pull_request.draft;

            if (!isDraft) {
              const checklist = `
## PR Review Checklist

- [ ] Tests added/updated and passing
- [ ] Documentation updated (if needed)
- [ ] TypeScript types are correct
- [ ] No console.log or debug code left behind
- [ ] Security considerations addressed
- [ ] Breaking changes documented
`;

              const currentBody = context.payload.pull_request.body || '';
              if (!currentBody.includes('PR_REVIEW_CHECKLIST')) {
                await github.rest.pulls.update({
                  owner, repo,
                  pull_number: prNumber,
                  body: (currentBody || '') + '\n\n' + checklist
                });
              }
            }

  pr-title-check:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "Checking PR title: $TITLE"

          PATTERN="^(feat|fix|docs|style|refactor|perf|test|ci|build|chore|revert)(\\([^)]+\\))?!?: .{1,50}"

          if echo "$TITLE" | grep -qE "$PATTERN"; then
            echo "PR title follows conventional commits format"
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "PR title does not follow conventional commits format"
            echo "Expected format: type(scope): description"
            echo "Valid types: feat, fix, docs, style, refactor, perf, test, ci, build, chore, revert"
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Update PR status check
        if: steps.pr-title-check.outputs.valid == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: prNumber,
              body: '## PR Title Format\n\nYour PR title does not follow conventional commits format.\n\n**Expected:** `type(scope): description`'
            });

  pr-template-check:
    name: Check PR Description
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const isDraft = context.payload.pull_request.draft;
            if (isDraft) {
              console.log('Draft PR, skipping');
              return;
            }
            const hasTemplateMarkers = body.includes('## Description') || body.includes('## What') || body.includes('## Motivation');
            const isEmpty = body.trim().length < 20;
            if (isEmpty) {
              console.log('PR description is short');
            } else if (!hasTemplateMarkers) {
              console.log('PR may not use template');
            }