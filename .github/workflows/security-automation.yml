name: Security Automation

on:
  schedule:
    # Every day at 6 AM UTC (9 AM Tallinn)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_audit:
        description: 'Run full audit even if no changes detected'
        required: false
        default: 'false'
  # Run after Dependabot PRs to auto-merge if clean
  pull_request:
    types: [opened, synchronize]

jobs:
  # ── Step 1: Audit ──────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      vulnerabilities: ${{ steps.audit.outputs.vuln_count }}
      has_vulns: ${{ steps.audit.outputs.has_vulns }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Run npm audit
        id: audit
        run: |
          VULNS=$(npm audit --audit-level=high --json 2>/dev/null | python3 -c "
import json,sys
d=json.load(sys.stdin)
vulns = d.get('metadata',{}).get('vulnerabilities',{})
high = vulns.get('high',0)
critical = vulns.get('critical',0)
total = sum(vulns.values())
print(f'{total}')
print('true' if total > 0 else 'false')
" 2>/dev/null)
          echo "vuln_count=$VULNS" >> $GITHUB_OUTPUT
          echo "has_vulns=true" >> $GITHUB_OUTPUT
        shell: bash

      - name: Show audit summary
        run: |
          npm audit --audit-level=high || true
          echo "High+ vulnerabilities: ${{ steps.audit.outputs.vuln_count }}"

  # ── Step 2: Auto-fix production dependencies ────────────────────────
  fix:
    name: Security Fix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    needs: audit
    if: needs.audit.outputs.has_vulns == 'true'
    outputs:
      fixed: ${{ steps.fix.outputs.changes_made }}
      pr_url: ${{ steps.create_pr.outputs.pr_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Fix production vulnerabilities
        id: fix
        run: |
          npm audit fix --audit-level=high --production --legacy-peer-deps || true
          npm install --save --legacy-peer-deps 2>&1 | tail -5

          if git diff --quiet; then
            echo "No changes needed (already fixed)"
            echo "changes_made=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "changes_made=true" >> $GITHUB_OUTPUT
            git config user.name "AGX Security Bot"
            git config user.email "agx-security-bot@ag064.dev"
            git add package.json package-lock.json
            git diff --cached --stat
          fi
        shell: bash

      - name: Build to verify no breakage
        if: steps.fix.outputs.changes_made == 'true'
        run: npm run build || { echo "BUILD FAILED - skip PR"; exit 1; }

      - name: TypeScript check
        if: steps.fix.outputs.changes_made == 'true'
        run: npm run typecheck || { echo "TYPECHECK FAILED - skip PR"; exit 1; }

      - name: Lint check
        if: steps.fix.outputs.changes_made == 'true'
        run: npm run lint || { echo "LINT FAILED - skip PR"; exit 1; }

      - name: Create PR
        id: create_pr
        if: steps.fix.outputs.changes_made == 'true'
        run: |
          git checkout -b security/auto-fix-$(date +%Y%m%d)
          git commit -m "fix: security audit auto-fix $(date +%Y-%m-%d)"
          PR_URL=$(gh pr create \
            --title "Security: auto-fix $(date +%Y-%m-%d)" \
            --body "Automated security fix. npm audit found vulnerabilities - auto-fixed production dependencies.

**Changes:** package.json + package-lock.json
**Verification:** build + typecheck + lint passed

⚠️  Auto-generated by AGX Security Bot" \
            --label "security" --label "automated" \
            --base development 2>&1)
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Step 3: Docker base image scan ──────────────────────────────────
  docker-scan:
    name: Docker Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check Alpine version in Dockerfile
        id: alpine_check
        run: |
          ALPINE_LINE=$(grep -n "alpine" ~/.openclaw/workspace/ag-claw/docker/Dockerfile 2>/dev/null | head -3)
          echo "Alpine lines: $ALPINE_LINE"

          # Check if base image is outdated
          if grep -q "alpine3\.\(16\|17\|18\)" ~/.openclaw/workspace/ag-claw/docker/Dockerfile; then
            echo "OUTDATED=true" >> $GITHUB_OUTPUT
            echo "Base image may be outdated (Alpine < 3.19)"
          else
            echo "OUTDATED=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        if: needs.audit.outputs.has_vulns == 'true'
        run: docker build -t ag-claw:audit-test -f docker/Dockerfile . --progress=plain 2>&1 | tail -10

  # ── Step 4: Auto-merge Dependabot PRs ─────────────────────────────
  auto-merge-dependabot:
    name: Auto-Merge Dependabot
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Auto-merge approved Dependabot PRs
        run: |
          # Find Dependabot PRs that are ready to merge
          gh pr list --label "dependabot" --state "open" --json number,title,body,autoMergeRequest \
            --jq '.[] | "\(.number) \(.title)"' 2>/dev/null | while read pr; do
            NUM=$(echo $pr | cut -d' ' -f1)
            echo "Checking PR #$NUM: $pr"

            # Check CI status
            CI_STATUS=$(gh pr check $NUM --json statusCheckRollup --jq '.[0].statusCheckRollup[] | select(.conclusion=="FAILURE") | .conclusion' 2>/dev/null)

            if [ -z "$CI_STATUS" ]; then
              echo "CI passed - attempting merge"
              gh pr merge $NUM --auto --squash --delete-branch 2>&1 || true
            else
              echo "CI not ready or failed - skipping"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Summary ─────────────────────────────────────────────────────────
  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [audit, fix, docker-scan]
    if: always()
    steps:
      - name: Security run summary
        run: |
          echo "=== AGX Security Automation Summary ==="
          echo "Vulnerabilities found: ${{ needs.audit.outputs.vulnerabilities }}"
          echo "Fix applied: ${{ needs.fix.outputs.changes_made || 'none needed' }}"
          echo "Docker outdated: ${{ needs.docker-scan.outputs.outdated || 'unknown' }}"
          echo "Run: $(date)"
