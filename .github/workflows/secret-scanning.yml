name: Secret Scanning

on:
  push:
    branches: [main, master, develop, development]
  pull_request:
    branches: [main, master, develop, development]

jobs:
  gitleaks:
    name: Gitleaks Secret Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare committed tree
        run: |
          mkdir gitleaks-scan
          git archive --format=tar HEAD | tar -x -C gitleaks-scan

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "$PWD/gitleaks-scan:/scan:ro" \
            -v "$PWD:/out" \
            ghcr.io/gitleaks/gitleaks:v8.24.3 \
            dir /scan \
            --redact \
            --verbose \
            --exit-code 2 \
            --report-format sarif \
            --report-path /out/results.sarif

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: results.sarif
          if-no-files-found: ignore
