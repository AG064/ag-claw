name: Telegram Notifications

on:
  push:
    branches: [main]
  release:
    types: [published]
  pull_request:
    types: [closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'release' || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
    steps:
      - name: Send push notification
        if: github.event_name == 'push'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=@ag_claw" \
            -d "text=🔔 ${{ github.actor }} pushed to main" \
            -d "parse_mode=Markdown"
