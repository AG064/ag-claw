name: Telegram Notifications

on:
  release:
    types: [published]
  pull_request:
    types: [closed]

permissions: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
    steps:
      - name: Send release notification
        if: github.event_name == 'release'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=@ag_claw" \
            -d "text=🚀 *New Release:* ${{ github.event.release.tag_name }}" \
            -d "parse_mode=Markdown"

      - name: Send PR merged notification
        if: github.event_name == 'pull_request'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=@ag_claw" \
            -d "text=✅ *PR #${{ github.event.pull_request.number }}* merged by ${{ github.actor }}" \
            -d "parse_mode=Markdown"
