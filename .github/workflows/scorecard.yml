name: Security Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ossf/scorecard-action@v2
        with:
          results-file: results.sarif
      - uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
